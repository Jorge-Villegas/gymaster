# Este archivo configura el analizador, que analiza estáticamente el código Dart 
# para comprobar errores, advertencias y lints.
#
# Los problemas identificados por el analizador se muestran en la interfaz 
# de usuario de los IDE compatibles con Dart (https://dart.dev/tools#ides-and-editors). 
# El analizador también se puede invocar desde la línea de comandos ejecutando `flutter analyze`.

# La siguiente línea activa un conjunto de lints recomendados para aplicaciones, 
# paquetes y complementos de Flutter, diseñados para fomentar buenas prácticas de codificación.
analyzer:
  errors:
    avoid_print: ignore
include: package:flutter_lints/flutter.yaml

linter:
# Las reglas de lint aplicadas a este proyecto se pueden personalizar en la sección 
# a continuación para deshabilitar las reglas del `package:flutter_lints/flutter.yaml`
# incluido anteriormente o para habilitar reglas adicionales. Una lista de todos los lints disponibles
# y su documentación está publicada en https://dart.dev/lints.
#
# En lugar de deshabilitar una regla de lint para todo el proyecto en la sección 
# a continuación, también se puede suprimir para una sola línea de código
# o un archivo dart específico usando la sintaxis `// ignore: name_of_lint` y
# `// ignore_for_file: name_of_lint` en la línea o en el archivo
# que produce el lint.
  rules:
    # avoid_print: false # Descomentar para desactivar la regla `avoid_print`
    # prefer_single_quotes: true # Descomentar para activar la regla `prefer_single_quotes`

# Información adicional sobre este archivo se puede encontrar en
# https://dart.dev/guides/language/analysis-options
